job_list: 
  main_page: https://careers.emeal.nttdata.com/s/?language=pt_BR
  outdir: job_list.json
  steps:
    - name: Reject cookie
      action: click
      locator:
        frame:
          strategy: css
          value: "#ifrmCookieBanner"
        strategy: role
        role: button
        options:
          name: Decline

    - name: Fill job description
      action: fill
      value: Desenvolvedor
      locator:
        strategy: placeholder
        value: Encontre a oportunidade que está procurando

    - name: Submit search
      action: click
      locator:
        strategy: role
        role: button
        options:
          name: Pesquisar

    - name: Get all job link
      action: attribute
      value: href
      locator:
        strategy: role
        role: link
        options:
          name: Ver mais

job_info:
